name: Auto Release

on:
  push:
    branches:
      - main
      - master

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from Cargo.toml
        id: ver
        run: |
          VERSION=$(grep -m1 '^version' crates/omah_bin/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists — skipping."
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Release v${VERSION} not found — will release."
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  # ── CLI binaries ────────────────────────────────────────────────────────────

  build:
    name: Build CLI ${{ matrix.name }}
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            apt_packages: musl-tools
            binary: omah
            archive_ext: tar.gz

          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            apt_packages: ""
            binary: omah
            archive_ext: tar.gz

          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            apt_packages: ""
            binary: omah
            archive_ext: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system packages
        if: matrix.apt_packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_packages }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-auto-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-auto-release-${{ matrix.target }}-
            ${{ runner.os }}-cargo-auto-release-

      - name: Build release binary
        run: cargo build --bin omah --target ${{ matrix.target }} --release --locked

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Package
        id: package
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          ARCHIVE="omah-v${VERSION}-${{ matrix.name }}.tar.gz"
          tar -czf "${ARCHIVE}" -C "target/${{ matrix.target }}/release" "${{ matrix.binary }}"
          echo "archive=${ARCHIVE}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.name }}
          path: ${{ steps.package.outputs.archive }}
          retention-days: 1
          if-no-files-found: error

  # ── Desktop app (Tauri) ─────────────────────────────────────────────────────

  build-desktop:
    name: Build Desktop ${{ matrix.name }}
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            os: macos-latest

          - name: macos-x86_64
            os: macos-13

          - name: linux-x86_64
            os: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            apps/desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-desktop-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-desktop-

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app
        working-directory: apps/desktop
        run: bun run tauri:build

      - name: Upload macOS dmg
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: apps/desktop/src-tauri/target/release/bundle/macos/*.dmg
          retention-days: 1
          if-no-files-found: error

      - name: Upload Linux AppImage
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 1
          if-no-files-found: error

  # ── GitHub Release ──────────────────────────────────────────────────────────

  release:
    name: Create Release
    needs: [check, build, build-desktop]
    if: always() && needs.check.outputs.should_release == 'true' && needs.build.result == 'success' && needs.build-desktop.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "omah v${VERSION}" \
            --generate-notes \
            artifacts/*
