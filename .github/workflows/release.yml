name: CI / Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --workspace --locked

  build-check:
    name: Build Check (TUI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-build-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-check-
            ${{ runner.os }}-cargo-

      - name: Build with TUI feature
        run: cargo build --workspace --features tui --locked

  # ── CLI binaries ────────────────────────────────────────────────────────────

  build:
    name: Build CLI ${{ matrix.name }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            apt_packages: musl-tools
            binary: omah
            archive_ext: tar.gz

          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            apt_packages: ""
            binary: omah
            archive_ext: tar.gz

          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            apt_packages: ""
            binary: omah
            archive_ext: tar.gz

          # - name: windows-x86_64
          #   os: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   apt_packages: ""
          #   binary: omah.exe
          #   archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system packages
        if: matrix.apt_packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_packages }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ matrix.target }}-
            ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: cargo build --bin omah --features tui --target ${{ matrix.target }} --release --locked

      - name: Strip binary (Unix)
        if: matrix.archive_ext == 'tar.gz'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Package (Unix)
        id: package
        if: matrix.archive_ext == 'tar.gz'
        run: |
          VERSION="${{ github.ref_name }}"
          ARCHIVE="omah-${VERSION}-${{ matrix.target }}.tar.gz"
          tar -czf "${ARCHIVE}" -C "target/${{ matrix.target }}/release" "${{ matrix.binary }}"
          echo "archive=${ARCHIVE}" >> $GITHUB_OUTPUT

      # - name: Package (Windows)
      #   id: package
      #   if: matrix.archive_ext == 'zip'
      #   shell: pwsh
      #   run: |
      #     $version = "${{ github.ref_name }}"
      #     $archive = "omah-${version}-${{ matrix.target }}.zip"
      #     Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath $archive
      #     "archive=${archive}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.name }}
          path: ${{ steps.package.outputs.archive }}
          retention-days: 1
          if-no-files-found: error

  # ── Desktop app (Tauri) ─────────────────────────────────────────────────────

  build-desktop:
    name: Build Desktop ${{ matrix.name }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            os: macos-latest

          - name: macos-x86_64
            os: macos-13

          - name: linux-x86_64
            os: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            apps/desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-desktop-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-desktop-

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app
        working-directory: apps/desktop
        run: bun run tauri:build

      - name: Upload macOS dmg
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: apps/desktop/src-tauri/target/release/bundle/macos/*.dmg
          retention-days: 1
          if-no-files-found: error

      - name: Upload Linux AppImage
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 1
          if-no-files-found: error

  # ── GitHub Release ──────────────────────────────────────────────────────────

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "omah ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
