name: CI / Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --workspace --locked

  build:
    name: Build ${{ matrix.name }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            apt_packages: musl-tools
            binary: omah
            archive_ext: tar.gz

          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            apt_packages: ""
            binary: omah
            archive_ext: tar.gz

          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            apt_packages: ""
            binary: omah
            archive_ext: tar.gz

          # - name: windows-x86_64
          #   os: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   apt_packages: ""
          #   binary: omah.exe
          #   archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system packages
        if: matrix.apt_packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_packages }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ matrix.target }}-
            ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: cargo build --bin omah --features tui --target ${{ matrix.target }} --release --locked

      - name: Strip binary (Unix)
        if: matrix.archive_ext == 'tar.gz'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Package (Unix)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          VERSION="${{ github.ref_name }}"
          ARCHIVE="omah-${VERSION}-${{ matrix.target }}.tar.gz"
          tar -czf "${ARCHIVE}" -C "target/${{ matrix.target }}/release" "${{ matrix.binary }}"
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      # - name: Package (Windows)
      #   if: matrix.archive_ext == 'zip'
      #   shell: pwsh
      #   run: |
      #     $version = "${{ github.ref_name }}"
      #     $archive = "omah-${version}-${{ matrix.target }}.zip"
      #     Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath $archive
      #     "ARCHIVE=${archive}" | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: actions/upload-artifact@v4
        with:
          name: omah-${{ matrix.name }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1
          if-no-files-found: error

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: omah-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "omah ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
